name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # The Raspberry Pi hardware libraries are imported lazily, so the
          # test suite only needs the dev tools plus evdev (pure-Linux, used
          # for the QR keymap tests).
          pip install -r requirements-dev.txt evdev

      - name: Lint (pyflakes-level checks)
        run: ruff check --select E9,F63,F7,F82,F401,F811 src main.py tests

      - name: Run tests
        run: python -m pytest -q
